<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="container">
<h2>Registration Form</h2>
<h4>Login</h4>

<form id="Registrationform">

<label class="bold">Name:</label> <input type="text" id="name" name="name" placeholder="Enter your name">

<label class="bold">Email:</label> <input type="text" id="email" name="email" placeholder="Enter your email">

<div class="password-container">
<input type="password" id="password" placeholder="Enter password">
<i class="fa-solid fa-eye eye" id="togglePassword"></i>
</div>

<div id="passwordHint" class="password-hint">
<p id="lengthRule">• Minimum 6 characters</p>
<p id="upperRule">• At least one uppercase letter</p>
</div>
<div class="strength-bar">
<div id="strengthFill"></div>
</div>
<p id="strengthText"></p>


<div class="gender">
<label class="bold">Gender</label>
<div class="radio">
<label><input type="radio" name="gender" value="Male"> Male</label>
<label><input type="radio" name="gender" value="Female"> Female</label>
<label><input type="radio" name="gender" value="Other"> Prefer not to say</label>
</div>
<div id="genderError" class="gender-error"></div>
</div>

<div class="gender">
<label class="bold">Skills</label>
<div class="radio">
<label><input type="checkbox" name="skills" value="HTML"> HTML</label>
<label><input type="checkbox" name="skills" value="CSS"> CSS</label>
<label><input type="checkbox" name="skills" value="JavaScript"> JavaScript</label>
<label><input type="checkbox" name="skills" value="C++"> C++</label>
<label><input type="checkbox" name="skills" value="Python"> Python</label>
<label><input type="checkbox" name="skills" value="Java"> Java</label>
</div>
<div id="skillsError" class="gender-error"></div>
</div>

<label class="bold">City</label> <select id="city">

<option value="">Select</option>
<option value="Bangalore">Bangalore</option>
<option value="Mumbai">Mumbai</option>
<option value="Chennai">Chennai</option>
<option value="Delhi">Delhi</option>
<option value="Kerala">Kerala</option>
<option value="Others">Others</option>
</select>

<input type="text" id="otherCity" placeholder="Enter your city" style="display:none;">

<label class="bold">Feedback</label>

<textarea id="feedback"></textarea>

<input type="submit" class="color" value="Submit">

</form>
</div>

<script src="script.js"></script>

</body>
</html>
